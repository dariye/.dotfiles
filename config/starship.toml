format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$ruby\
$nodejs\
$python\
$rust\
$character"""

[directory]
style = "blue"

[character]
success_symbol = "[‚ùØ](purple)"
error_symbol = "[‚ùØ](red)"
vimcmd_symbol = "[‚ùÆ](green)"

[git_branch]
format = "[$branch]($style)"
style = "bright-black"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = "‚Äã"
untracked = "‚Äã"
modified = "‚Äã"
staged = "‚Äã"
renamed = "‚Äã"
deleted = "‚Äã"
stashed = "‚â°"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[ruby]
format = "[$symbol$version]($style) "
symbol = ""
style = "bright-black"
detect_files = ["Gemfile", ".ruby-version"]

[nodejs]
format = "[$symbol$version]($style) "
symbol = ""
style = "bright-black"
detect_files = ["package.json", ".node-version"]

[python]
format = "[$virtualenv]($style) "
style = "bright-black"

[rust]
format = "[$symbol$version]($style) "
symbol = ""
style = "bright-black"
detect_files = ["Cargo.toml"]
